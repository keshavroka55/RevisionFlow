services:
  db:
    image: postgres:16-alpine
    container_name: revisionflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - revisionflow-net

  api:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: revisionflow-api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - revisionflow-net

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_GOOGLE_AUTH_URL: https://revisionflow.keshavdev.me/api/auth/google

    container_name: revisionflow-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"
    networks:
      - revisionflow-net

volumes:
  postgres_data:

networks:
  revisionflow-net:
    driver: bridge
