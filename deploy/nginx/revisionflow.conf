server {
  listen 80;
  server_name revisionflow.keshavdev.me;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl http2;
  server_name revisionflow.keshavdev.me;
  ssl_certificate /etc/letsencrypt/live/revisionflow.keshavdev.me/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/revisionflow.keshavdev.me/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  add_header Strict-Transport-Security "max-age=31536000" always;
  root /usr/share/nginx/html;
  client_max_body_size 10M;
  location /api/ {
    proxy_pass http://api:5000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location / { try_files $uri $uri/ /index.html; }
  location ~* \.(js|css|png|jpg|svg|woff2)$ { expires 1y; }
  location = /index.html { add_header Cache-Control "no-cache"; }
}